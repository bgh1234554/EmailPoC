<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>Dartoo 계정 활성화</title>
</head>
<body style="font-family: Helvetica, Arial, sans-serif; box-sizing: border-box; font-size: 14px; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: none; width: 100% !important; height: 100%; line-height: 1.6em; background-color: #f6f6f6; margin: 0; padding: 0;">

<table class="body-wrap" style="font-family: Helvetica, Arial, sans-serif; box-sizing: border-box; font-size: 14px; width: 100%; background-color: #f6f6f6; margin: 0; padding: 20px;">
    <tr>
        <td></td>
        <td class="container" width="600" style="display: block !important; max-width: 600px !important; clear: both !important; margin: 0 auto;">
            <div class="content" style="max-width: 600px; display: block; margin: 0 auto; padding: 20px;">
                <table class="main" width="100%" cellpadding="0" cellspacing="0" style="border-radius: 3px; background-color: #ffffff; border: 1px solid #e9e9e9;">
                    <tr>
                        <td class="content-wrap" style="padding: 30px;">
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td class="content-block" style="padding: 0 0 20px;">
                                        <h2 style="font-family: Helvetica, Arial, sans-serif; line-height: 1.2em; color: #000000; font-weight: 400; margin: 0 0 20px; font-size: 24px;">
                                            Dartoo 계정 활성화
                                        </h2>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="content-block" style="padding: 0 0 20px;">
                                        안녕하세요.
                                    </td>
                                </tr>

                                <tr>
                                    <td class="content-block" style="padding: 0 0 20px;">
                                        Dartoo 계정을 활성화하려면 아래 버튼을 클릭하세요.
                                    </td>
                                </tr>

                                <tr>
                                    <td class="content-block" style="padding: 0 0 20px;">
                                        이 링크는 <strong th:text="${expireMinutes}">30</strong>분 동안 유효합니다.
                                    </td>
                                </tr>

                                <tr>
                                    <td class="content-block" style="padding: 0 0 20px;">
                                        <a th:href="${activationLink}"
                                           href="http://localhost:8080/api/poc/email/activate?token=sample"
                                           class="btn-primary"
                                           style="text-decoration: none; color: #ffffff; background-color: #348eda; border: solid #348eda; border-width: 10px 20px; line-height: 2em; font-weight: bold; text-align: center; cursor: pointer; display: inline-block; border-radius: 5px;">
                                            계정 활성화하기
                                        </a>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="content-block" style="padding: 0 0 20px;">
                                        버튼이 동작하지 않는다면 아래 링크를 브라우저에 복사해서 접속하세요.
                                    </td>
                                </tr>

                                <tr>
                                    <td class="content-block" style="padding: 0 0 20px; word-break: break-all; color: #666666; font-size: 13px;"
                                        th:text="${activationLink}">
                                        http://localhost:8080/api/poc/email/activate?token=sample
                                    </td>
                                </tr>

                                <tr>
                                    <td class="content-block" style="padding: 0;">
                                        본인이 요청하지 않았다면 이 이메일은 무시해도 됩니다.
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <div class="footer" style="width: 100%; clear: both; color: #999999; padding: 20px;">
                    <table width="100%">
                        <tr>
                            <td class="aligncenter content-block" style="text-align: center; color: #999999; font-size: 12px;">
                                Dartoo Email PoC
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        </td>
        <td></td>
    </tr>
</table>

</body>
</html>
