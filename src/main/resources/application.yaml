spring:
  application:
    name: email-poc
  datasource:
    url: jdbc:h2:mem:brevo-poc
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true

  mail:
  # JavaMailSender가 알아서 application.yml에서 긁어와서
  # SMTP relay 방식에서 사용
    host: smtp-relay.brevo.com
    port: 587
    username: ${BREVO_ACCOUNT_EMAIL}
    password: ${BREVO_SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mail:
  from: ${MAIL_FROM}
  activation:
    expire-minutes: 30

brevo: # Brevo SDK 방식에서 사용
  api-key: ${BREVO_API_KEY}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

logging:
  level:
    org.hibernate.SQL: debug